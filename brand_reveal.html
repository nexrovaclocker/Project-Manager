<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXROVA - High-End Brand Reveal</title>
    <!-- Outfit Font for Modern Minimalist Tech Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <!-- GSAP for precision, cinematic animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* CSS Foundation */
        :root {
            --bg-matte-black: #080808;
            --stark-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-matte-black);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            /* Subtle radial gradient to focus center */
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
        }

        .reveal-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stage 1 & 2: Logo Box */
        .logo-box {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: scale(0.8);
            border-radius: 20px; /* Slight rounding for a premium tech feel */
        }

        /* Vibrant Glowing Gradient Transition (White -> Yellow -> Orange) */
        .glow-layer {
            position: absolute;
            top: -6px; right: -6px; bottom: -6px; left: -6px;
            background: linear-gradient(45deg, #ffffff, #ffea00, #ff8c00);
            z-index: -1;
            border-radius: inherit;
            filter: blur(14px);
            opacity: 0;
            /* Will be triggered by GSAP upon completion of intro */
        }

        @keyframes pulseGlow {
            0% { opacity: 0.6; filter: blur(12px); transform: scale(0.98); }
            100% { opacity: 1; filter: blur(18px); transform: scale(1.02); }
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            z-index: 2;
            position: relative;
            background-color: var(--bg-matte-black); /* fallback */
        }

        /* Text Mask Wrapper using Clip-Path */
        .text-box {
            display: flex;
            align-items: center;
            margin-left: 0;
            /* Hide the text completely from the right via clip-path */
            clip-path: inset(0 100% 0 0);
            -webkit-clip-path: inset(0 100% 0 0);
        }

        .text-content {
            font-size: 84px;
            font-weight: 200;
            /* Minimalist, high-end */
            letter-spacing: 24px;
            color: var(--stark-white);
            margin: 0;
            /* Negative margin to offset last character's letter-spacing for perfect centering */
            margin-right: -24px;
            white-space: nowrap;
            /* Slight bump so it doesn't immediately touch the left boundary perfectly */
            padding-left: 10px;
            line-height: 1;
        }

    </style>
</head>

<body>

    <div class="reveal-container">
        <!-- The logo container with animated gradient glow -->
        <div class="logo-box">
            <div class="glow-layer"></div>
            <!-- Absolute path to the Next.js public directory image -->
            <img src="/logo.jpeg" alt="NEXROVA Logo" class="logo-img" />
        </div>

        <!-- The clip-path wipe-in text reveal -->
        <div class="text-box">
            <h1 class="text-content">NEXROVA</h1>
        </div>
    </div>

    <script>
        // Main setup function ensures the animation only triggers when everything is ready
        function initializeReveal() {
            const tl = gsap.timeline();

            // Stage 1 (0s-2.5s): Fade in + Cinematic Zoom
            tl.fromTo('.logo-box',
                { opacity: 0, scale: 0.8 },
                {
                    opacity: 1,
                    scale: 1.1,
                    duration: 2.5,
                    ease: 'power2.inOut'
                },
                0
            );

            // Ignite the vibrant white->yellow->orange glow
            tl.to('.glow-layer', {
                opacity: 0.8,
                duration: 1.0,
                ease: 'power1.inOut',
                onComplete: () => {
                    // Start pulsing infinitely after initial reveal
                    document.querySelector('.glow-layer').style.animation = 'pulseGlow 2.5s infinite alternate ease-in-out';
                }
            }, 1.5);

            // Stage 2 (2.5s-4s): Smooth slide + Text Clip-Path Reveal
            tl.to('.logo-box', {
                scale: 1.0,
                duration: 1.5,
                ease: 'power3.inOut'
            }, 2.5);

            // Emerge the text directly from the right edge of the logo using clip-path 
            // Also push the text-box out visually to create the 'emerging' tracking
            tl.fromTo('.text-box',
                { marginLeft: 0, clipPath: 'inset(0 100% 0 0)', webkitClipPath: 'inset(0 100% 0 0)' },
                {
                    marginLeft: 40, // Premium visual gap
                    clipPath: 'inset(0 0% 0 0)',
                    webkitClipPath: 'inset(0 0% 0 0)',
                    duration: 1.5,
                    ease: 'power3.inOut'
                },
                2.5
            );
        }

        // DEPLOYMENT FIX:
        // Use the window load event rather than DOMContentLoaded. 
        // This ensures all assets (specifically /logo.jpeg) are fully downloaded out of the public folder
        // so that the animation isn't skipped during the hydration phase in Vercel/Next.js production.
        if (document.readyState === 'complete') {
            initializeReveal();
        } else {
            window.addEventListener('load', initializeReveal);
        }
    </script>
</body>

</html>
