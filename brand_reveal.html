<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXROVA - High-Tech Hacker Terminal</title>
    <!-- Use a monospaced font as requested -->
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    <!-- GSAP for precision, cinematic animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    <style>
        /* CSS Foundation */
        :root {
            --bg-pure-black: #000000;
            --hacker-gold: #E0B045;
            --matrix-green: #39FF14;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-pure-black);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Geist Mono', 'Courier New', monospace;
            overflow: hidden;
        }

        .reveal-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stage 1: Logo Box */
        .logo-box {
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: scale(0.8);
            border: 1px solid var(--hacker-gold);
            box-shadow: 0 0 10px var(--hacker-gold);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            position: relative;
        }

        .text-box {
            display: flex;
            align-items: center;
            margin-left: 40px;
        }

        .text-content {
            font-size: 84px;
            font-weight: 200;
            letter-spacing: 12px;
            color: var(--hacker-gold);
            margin: 0;
            white-space: nowrap;
            padding-left: 10px;
            line-height: 1;
            /* Typewriter cursor style */
            border-right: 2px solid var(--hacker-gold);
            padding-right: 5px;
        }

    </style>
</head>

<body>

    <div class="reveal-container">
        <!-- Logo container -->
        <div class="logo-box">
            <img src="/logo.jpeg" alt="NEXROVA Logo" class="logo-img" />
        </div>

        <div class="text-box">
            <h1 class="text-content" id="reveal-text"></h1>
        </div>
    </div>

    <script>
        gsap.registerPlugin(TextPlugin);

        function initializeReveal() {
            const tl = gsap.timeline();

            // Stage 1: Logo Reveal
            tl.fromTo('.logo-box',
                { opacity: 0, scale: 0.8 },
                {
                    opacity: 1,
                    scale: 1,
                    duration: 1.5,
                    ease: 'power2.inOut'
                }
            );

            // Stage 2: Typewriter Reveal
            tl.to("#reveal-text", {
                duration: 2,
                text: "NEXROVA",
                ease: "none",
                onComplete: () => {
                    // Blink cursor effect after typing
                    gsap.to("#reveal-text", {
                        borderRightColor: "transparent",
                        repeat: -1,
                        duration: 0.5,
                        yoyo: true
                    });
                }
            }, "+=0.5");
        }

        if (document.readyState === 'complete') {
            initializeReveal();
        } else {
            window.addEventListener('load', initializeReveal);
        }
    </script>
</body>

</html>
